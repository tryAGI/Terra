      responses:
        '200':
          description: Returned upon a successful request
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    users:
                      type: array
                      items:
                        $ref: '#/components/schemas/TerraUser'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        next:
                          type: integer
                          description: The next page number, or null if there is no next page
                          nullable: true
                        max_page:
                          type: integer
                          description: The maximum page index
                        results:
                          type: array
                          items:
