openapi: 3.0.3
info:
  description: The Terra API
  title: TerraAPI
  version: 2022.03.16
  license:
    name: Apache-2.0
    url: https://github.com/tryterra/openapi/blob/master/LICENSE
  termsOfService: https://tryterra.co/terms-of-service
  contact:
    name: Terra API
    url: https://tryterra.co/
    email: dev@tryterra.co
servers:
- url: https://api.tryterra.co/v2
security:
- ApiKeyAuth: []
- DevID: []
paths:
  /auth/authenticateUser:
    post:
      summary: Generate an authentication link
      description: Creates a login link that allows end users to connect their fitness tracking account
      tags:
      - Authentication
      operationId: Authentication_AuthenticateUser
      parameters:
      - name: resource
        in: query
        description: Provider resource identifier (e.g., 'FITBIT', 'GARMIN', 'OURA'). See "Get detailed list of integrations" for available providers
        schema:
          type: string
        example: FITBIT
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                reference_id:
                  type: string
                auth_success_redirect_url:
                  type: string
                auth_failure_redirect_url:
                  type: string
        required: false
      responses:
        '200':
          description: Returned when authentication link could be successfully generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - success
                    - error
                    description: indicates that the request was successful
                    example: success
                  user_id:
                    description: User ID for the user being created
                    type: string
                    example: 23dc2540-7139-44c6-8158-f81196e2cf2e
                  auth_url:
                    type: string
                    description: authentication URL the user must be redirected to in order to link their account
                    example: https://www.fitbit.com/oauth2/authorize?response_type=code&client_id=23BBG9&scope=settings+nutrition+sleep+heartrate+electrocardiogram+weight+respiratory_rate+oxygen_saturation+profile+temperature+cardio_fitness+activity+location&state=bLqqjPie9ptwoWm6VBxHCu6JkkoWJp
        '400':
          description: Returned when one or more parameters is malformed - an appropriate error message will be returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - error
                    description: indicates that an error happened (value is error)
        '404':
          description: Returned when a parameter does not exist on Terra's end (e.g. resource)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - success
                    - error
                    description: indicates that an error happened (value is error)
  /auth/generateWidgetSession:
    post:
      summary: Generate an authentication link, using the Terra Authentication Widget
      description: Generates a link to redirect an end user to for them to select an integration and log in with their fitness data provider
      tags:
      - Authentication
      operationId: Authentication_GenerateWidgetSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WidgetSessionParams'
        required: true
      responses:
        '200':
          description: Returned when authentication link could be successfully generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    description: Session ID for the widget authentication session
                    type: string
                    example: 23dc2540-7139-44c6-8158-f81196e2cf2e
                  url:
                    type: string
                    description: the widget URL the user must be redirected to in order to link their account
                    example: https://widget.tryterra.co/session/344d475f-296a-489a-a88c-54183671dafd
                  status:
                    type: string
                    enum:
                    - success
                    - error
                    description: indicates that the request was successful (value is success)
                    example: success
                  expires_in:
                    type: number
                    description: a number in seconds depicting how long the url is valid for
                    example: 900
        '400':
          description: Returned when one or more parameters is malformed - an appropriate error message will be returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - error
                    description: indicates that an error happened (value is error)
  /users/{user_id}:
    patch:
      summary: Modify user
      description: Update a Terra user's reference_id or active status
      tags:
      - User
      operationId: User_ModifyUser
      parameters:
      - name: user_id
        in: path
        description: Terra user ID to update
        required: true
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reference_id:
                  type: string
                  description: Identifier on your system to associate with this user
                  example: updatedUser123
                active:
                  type: boolean
                  description: Whether the user should remain active
      responses:
        '200':
          description: Returned upon successful user modification
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/TerraUser'
                  status:
                    type: string
                    enum:
                    - success
                    - error
                    description: Indicates that the request was successful
                    example: success
        '400':
          description: Returned if the parameters are malformed or no user is found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: A detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - success
                    - error
                    description: Indicates an error happened
  /auth/deauthenticateUser:
    delete:
      summary: Deauthenticates a user and deletes any cached data for them
      description: Deletes all records of the user on Terra's end, revoking Terra's access to their data
      tags:
      - Authentication
      operationId: Authentication_DeauthenticateUser
      parameters:
      - name: user_id
        in: query
        description: Terra user ID (UUID format) to deauthenticate and remove from Terra system
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Returned when user is successfully deauthenticated and data is deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    enum:
                    - success
                    - error
                    description: indicates that the deauthentication was successful (value is success)
                    type: string
        '404':
          description: Returned when the user_id is not existent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - success
                    - error
                    description: indicates that an error happened (value is error)
  /auth/generateAuthToken:
    post:
      tags:
      - Authentication
      summary: Generates an authentication token for the Terra mobile SDKs
      description: Creates a token to be used with initConnection() functions in the Terra mobile SDKs in order to create a user record for Apple Health or Samsung Health (or equivalent)
      operationId: Authentication_GenerateAuthToken
      responses:
        '200':
          description: '200'
          content:
            application/json:
              examples:
                Result:
                  value:
                    status: success
                    token: 250c68b9c21b78e40e7a3285a2d538d3bc24aabd3b4c76a782fb0a571ca4501d
                    expires_in: 180
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  token:
                    type: string
                    example: 250c68b9c21b78e40e7a3285a2d538d3bc24aabd3b4c76a782fb0a571ca4501d
                  expires_in:
                    type: integer
                    example: 180
                    default: 0
        '404':
          description: '404'
          content:
            application/json:
              examples:
                Result:
                  value:
                    status: error
                    message: Invalid dev-id was provided
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Invalid dev-id was provided
      deprecated: false
  /activity:
    get:
      summary: Retrieve activity data for a given user ID
      description: Fetches completed workout sessions, with a defined start and end time and activity type (e.g. running, cycling, etc.)
      tags:
      - Activity
      operationId: Activity_Fetch
      parameters:
      - name: user_id
        in: query
        description: Terra user ID (UUID format) to retrieve data for
        schema:
          type: string
        required: true
      - name: start_date
        in: query
        description: Start date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
        schema:
          oneOf:
          - type: integer
          - type: string
            format: date
        required: true
      - name: end_date
        in: query
        description: End date for data query - either ISO8601 date (YYYY-MM-DD) or unix timestamp in seconds (10-digit)
        schema:
          oneOf:
          - type: integer
          - type: string
            format: date
        required: false
      - name: to_webhook
        in: query
        description: 'Boolean flag specifying whether to send the data retrieved to the webhook instead of in the response (default: true if not provided)

          '
        schema:
          type: boolean
        required: false
      - name: with_samples
        in: query
        description: 'Boolean flag specifying whether to include detailed samples in the returned payload (default: false)

          '
        schema:
          type: boolean
        required: false
      responses:
        '200':
          description: Returned upon successful data request
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    user:
                      $ref: '#/components/schemas/TerraUser'
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/Activity'
                    type:
                      type: string
                      nullable: true
                - $ref: '#/components/schemas/NoDataReturned'
                - $ref: '#/components/schemas/DataSentToWebhook'
                - $ref: '#/components/schemas/RequestProcessing'
                - $ref: '#/components/schemas/RateLimitRequestProcessing'
                - $ref: '#/components/schemas/LargeRequestProcessingEvent'
        '400':
          description: Returned when one or more parameters is malformed - an appropriate error message will be returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - error
                    description: indicates that an error happened (value is error)
        '401':
          description: Returned when credentials (dev ID and API key) are invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: An error message
                    type: string
                    example: unauthorized
        '404':
          description: Returned when a parameter does not exist on Terra's end (e.g. user_id)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - error
                    description: indicates that an error happened (value is error)
    post:
      tags:
      - Activity
      operationId: Activity_Write
      description: Used to post activity data to a provider. This endpoint only works for users connected via Wahoo. Returns error for other providers.
      summary: Post activity data to a provider
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  description: List of user-tracked workouts to post to data provider
                  type: array
                  items:
                    $ref: '#/components/schemas/Activity'
              required:
              - data
        required: true
      responses:
        '201':
          description: Returned when activity was successfully created on the provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/TerraUser'
                  log_ids:
                    description: List of identifiers for the objects created, returned in the same order they were posted. I.e. Posting [ObjectA, ObjectB] will return [IdentifierA, IdentifierB]
                    type: array
                    items:
                      type: string
                  message:
                    type: string
                    default: Activity successfully logged
        '400':
          description: Returned when one or more parameters is malformed - an appropriate error message will be returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - error
                    description: indicates that an error happened (value is error)
        '404':
          description: Returned when a parameter does not exist on Terra's end (e.g. user_id)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    description: a detailed message describing the error
                    type: string
                  status:
                    type: string
                    enum:
                    - error
                    description: indicates that an error happened (value is error)
