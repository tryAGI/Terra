          example: United States
        bio:
          type: string
          description: User's bio - a short description they display on their profile.
          example: Passionate runner and cyclist
        state:
          type: string
          description: User's state of residence.
          example: California
        last_name:
          type: string
          description: User's last name.
          example: Smith
        sex:
          type: string
          description: User's sex.
          example: male
        city:
          type: string
          description: User's city of residence.
          example: San Francisco
        email:
          type: string
          description: User's email.
          example: user@example.com
        date_of_birth:
          type: string
          description: User's date of birth, in ISO8601 format.
          example: '1999-11-23'
        first_name:
          type: string
          description: User's first name.
          example: John
        gender:
          type: string
          description: User's gender.
          example: male
        joined_provider:
          type: string
          description: User's account creation date.
          example: '2023-01-15'
        devices:
          type: array
