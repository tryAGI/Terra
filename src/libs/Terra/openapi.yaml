      - name
      - macros
    NutritionMetadata:
      type: object
      properties:
        end_time:
          type: string
          description: The end time of the associated day, in ISO8601 format with microsecond precision. Will always fall on midnight of any given day, and will always be equal to 24h after start_time.
            TimeZone info will be provided whenever possible. If absent, the time corresponds to the user's local time.
          example: '2022-10-28T10:00:00.000000+01:00'
        start_time:
          type: string
          description: The start time of the associated day, in ISO8601 format with microsecond precision. Will always fall on midnight of any given day, and will always be equal to 24h before end_time.
            TimeZone info will be provided whenever possible. If absent, the time corresponds to the user's local time.
          example: '1999-11-23T09:00:00.000000+02:00'
        timestamp_localization:
          $ref: '#/components/schemas/TimestampLocalization'
      required:
      - end_time
      - start_time
    NutritionSummary:
      type: object
      properties:
        macros:
