          description: User's cadence at a given instant in time, in revolutions per minute
        timer_duration_seconds:
          type: number
          description: Time elapsed since the start of the workout, subtracting time during which the recording was paused
    SpeedSample:
      type: object
      properties:
        timestamp:
          type: string
          description: Time with which the record is associated, in ISO8601 format with microsecond precision. TimeZone info will be provided whenever possible. If absent, the time corresponds to the user's
            local time.
          example: '2022-11-23T09:00:00.000000+02:00'
        speed_meters_per_second:
          type: number
          description: Speed of the user at a given instant in time, in meters per second
        timer_duration_seconds:
          type: number
          description: Time elapsed since the start of the workout, subtracting time during which the recording was paused
    TorqueSample:
      type: object
      properties:
        timestamp:
          type: string
          description: Time with which the record is associated, in ISO8601 format with microsecond precision. TimeZone info will be provided whenever possible. If absent, the time corresponds to the user's
            local time
          example: '2022-11-23T09:00:00.000000+02:00'
