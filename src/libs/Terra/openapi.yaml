          type: boolean
          description: Flag indicating whether the sleep session was a nap, or the user's main sleep session for the day.
          example: false
        start_time:
          type: string
          description: The start time of the associated sleep session, in ISO8601 format with microsecond precision. Will always fall on midnight of any given day, and will always be equal to 24h before
            end_time. TimeZone info will be provided whenever possible. If absent, the time corresponds to the user's local time.
          example: '1999-11-23T22:00:00.000000+02:00'
        summary_id:
          type: string
          description: A unique identifier for the sleep session.
        timestamp_localization:
          $ref: '#/components/schemas/TimestampLocalization'
        upload_type:
          $ref: '#/components/schemas/SleepUploadType'
